<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asia Nomad Trip Planner</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171e26; --panel2:#1e2731; --line:#2a3642;
    --txt:#e8edf2; --mut:#8fa0b0; --acc:#37b3a4; --acc2:#f0a83c;
    --good:#46c08a; --warn:#e0a13a; --bad:#e0655c; --chip:#243140;
    --se:#37b3a4; --ea:#6c8ccf; --sa:#cf8a6c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45}
  header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#141b22,#10161c);
    border-bottom:1px solid var(--line);padding:10px 16px}
  .htop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{font-weight:700;font-size:16px;letter-spacing:.2px}
  .brand small{color:var(--mut);font-weight:500}
  .htop .grow{flex:1}
  .btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:7px 12px;cursor:pointer;font-size:13px;transition:.15s}
  .btn:hover{border-color:var(--acc);color:#fff}
  .btn.acc{background:var(--acc);border-color:var(--acc);color:#04221e;font-weight:600}
  .btn.sm{padding:4px 9px;font-size:12px}
  .btn.danger:hover{border-color:var(--bad);color:var(--bad)}
  nav{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
  nav button{background:none;border:none;color:var(--mut);padding:8px 14px;cursor:pointer;
    border-radius:8px 8px 0 0;font-size:13.5px;font-weight:600}
  nav button.active{color:#fff;background:var(--panel)}
  main{max-width:1180px;margin:0 auto;padding:18px 16px 80px}
  h2{font-size:18px;margin:0 0 4px}
  h3{font-size:15px;margin:18px 0 8px;color:#fff}
  .sub{color:var(--mut);font-size:12.5px;margin:0 0 14px}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat .k{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:22px;font-weight:700;margin-top:4px}
  .stat .v small{font-size:13px;color:var(--mut);font-weight:500}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
  tr:hover td{background:#1a2330}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .chip{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;background:var(--chip);
    border:1px solid var(--line);color:var(--mut)}
  .chip.idea{color:#9fb0c0}
  .chip.shortlist{color:var(--acc2);border-color:#5a4824}
  .chip.chosen,.chip.booked{color:var(--good);border-color:#26543f;background:#13241b}
  .pill{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .reg-SE{color:var(--se)} .reg-EA{color:#6c8ccf} .reg-SA{color:#cf8a6c}
  .bar{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#2c8f83)}
  .bar.over>span{background:linear-gradient(90deg,var(--bad),#b94a42)}
  .muted{color:var(--mut)}
  a{color:var(--acc)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .right{margin-left:auto}
  input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:8px 10px;font-size:13px;width:100%;font-family:inherit}
  input[type=checkbox]{width:auto;padding:0;transform:scale(1.3);cursor:pointer;accent-color:var(--acc)}
  tr.inrow td{background:#13241b}
  tr.offrow{opacity:.42}
  label{display:block;font-size:12px;color:var(--mut);margin:0 0 4px}
  .field{margin-bottom:11px}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  /* timeline */
  .tl{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;overflow-x:auto}
  .tl-months{display:flex;border-bottom:1px solid var(--line);margin-bottom:8px;min-width:760px}
  .tl-months div{flex:1;font-size:11px;color:var(--mut);padding:2px 4px;border-left:1px solid var(--line)}
  .tl-track{position:relative;min-width:760px;height:34px;margin:6px 0;border-radius:8px;background:#121922}
  .tl-seg{position:absolute;top:4px;height:26px;border-radius:7px;color:#06231f;font-size:11.5px;
    font-weight:700;display:flex;align-items:center;padding:0 8px;white-space:nowrap;overflow:hidden;cursor:pointer}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:100;
    align-items:flex-start;justify-content:center;padding:40px 14px;overflow:auto}
  .modal-bg.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:560px;max-width:100%;
    padding:18px}
  .modal h3{margin-top:0}
  .kb-card h4{margin:0 0 2px;font-size:15px}
  .kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .land{border-top:1px dashed var(--line);padding-top:7px;margin-top:7px}
  .land b{color:#fff}
  details summary{cursor:pointer;color:var(--acc);font-size:12.5px;margin-top:6px}
  .note{background:#172029;border:1px solid var(--line);border-left:3px solid var(--acc2);
    border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--mut)}
  .tag{font-size:11px;color:var(--mut)}
  .seg-edit{font-size:11px;color:var(--acc);cursor:pointer}
  @media print{header nav,.noprint{display:none}body{background:#fff;color:#000}}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div class="brand">🧭 Asia Nomad Trip Planner <small id="tripNameLbl"></small></div>
    <div class="grow"></div>
    <button class="btn sm" onclick="doExport()">⬇ Export</button>
    <button class="btn sm" onclick="document.getElementById('importFile').click()">⬆ Import</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="doImport(event)">
    <button class="btn sm" onclick="window.print()">🖨 Print</button>
  </div>
  <nav id="nav"></nav>
</header>
<main id="view"></main>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

var LS_KEY="asiaNomadPlanner_v1";
var state, activeTab="overview";

function load(){ try{var s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s);}catch(e){} return null; }
function save(){ try{localStorage.setItem(LS_KEY, JSON.stringify(state));}catch(e){} }
function uid(p){ return (p||"id")+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function kb(city){ return CITIES.find(function(c){return c.city===city;}); }
function curList(){ return Object.keys(state.rates); }
function nightsBetween(a,b){ if(!a||!b) return 0; var d=(new Date(b)-new Date(a))/86400000; return d>0?Math.round(d):0; }
function segNights(s){ return s.nights!=null?s.nights:nightsBetween(s.arrive,s.depart); }
function toHUF(amt,cur){ var r=state.rates[cur]; return (Number(amt)||0)*(r||0); }
function usdToHUF(u){ return (Number(u)||0)*(state.rates.USD||0); }
function fmtHUF(n){ n=Math.round(Number(n)||0); return n.toLocaleString("en-US").replace(/,/g," ")+" Ft"; }
function fmtUSD(n){ return "$"+(Math.round((Number(n)||0)))+""; }
function regName(r){ return r==="SE"?"Southeast Asia":r==="EA"?"East Asia":r==="SA"?"South Asia":r; }

/* ============================ BUDGET ENGINE ============================ */
function computeBudget(){
  var accom=0, live=0, transport=0, extras=0;
  var perSeg=[];
  state.segments.filter(function(s){return s.include!==false;}).forEach(function(s){
    var k=kb(s.city), nn=segNights(s), tier=(s.tier==null?1:s.tier);
    var inc=state.stays.filter(function(st){return st.segId===s.id && st.include;});
    var aHUF, aSrc;
    if(inc.length){
      aHUF=inc.reduce(function(a,st){return a+toHUF(st.ppn,st.cur)*(st.nights!=null?st.nights:nn);},0);
      aSrc="included";
    } else if(k){ aHUF=usdToHUF(k.accom[tier])*nn; aSrc="estimate"; }
    else { aHUF=0; aSrc="none"; }
    var lHUF = k? usdToHUF(k.live[tier])*nn : 0;
    accom+=aHUF; live+=lHUF;
    perSeg.push({seg:s, nights:nn, tier:tier, accom:aHUF, accomSrc:aSrc, live:lHUF, total:aHUF+lHUF, kb:k});
  });
  state.transport.forEach(function(t){ if(t.include) transport+=toHUF(t.price,t.cur); });
  state.extras.forEach(function(e){ if(e.include) extras+=toHUF(e.amount,e.cur); });
  var grand=accom+live+transport+extras;
  var totalNights=state.segments.filter(function(s){return s.include!==false;}).reduce(function(a,s){return a+segNights(s);},0);
  return {accom:accom,live:live,transport:transport,extras:extras,grand:grand,perSeg:perSeg,
          totalNights:totalNights, perPerson:grand/(state.meta.travelers||1),
          perDay: totalNights? grand/totalNights:0};
}

function toggleInc(kind,id){
  var arr = kind==="seg"?state.segments : kind==="stay"?state.stays : kind==="trip"?state.transport : state.extras;

  save(); render();
}

function viewTimeline(){
  var segs=state.segments.slice().sort(function(a,b){return new Date(a.arrive)-new Date(b.arrive);});

  if(!segs.length){ return h+'<div class="card muted">No stops yet — add your first destination.</div>'; }
  var inc=segs.filter(function(s){return s.include!==false;});
  if(inc.length){
    var min=new Date(inc[0].arrive), max=new Date(inc[inc.length-1].depart);
    inc.forEach(function(s){ var a=new Date(s.arrive),d=new Date(s.depart); if(a<min)min=a; if(d>max)max=d; });
    var span=(max-min)||1;
    var months=[]; var cur=new Date(min.getFullYear(),min.getMonth(),1);
    while(cur<=max){ months.push(new Date(cur)); cur.setMonth(cur.getMonth()+1); }
    var mlbl=months.map(function(m){return '<div>'+m.toLocaleString("en-US",{month:"short"})+" '"+String(m.getFullYear()).slice(2)+'</div>';}).join("");
    h+='<div class="tl"><div class="tl-months">'+mlbl+'</div>';
    inc.forEach(function(s){
      var a=new Date(s.arrive),d=new Date(s.depart);

      var k=kb(s.city);

    });
    h+='</div>';
  }
  h+='<div class="tablewrap" style="margin-top:16px"><table><thead><tr><th>In plan</th><th>Stop</th><th>Country</th><th>Dates</th><th>Nights</th><th>Tier</th><th>Weather</th><th>Notes</th><th></th></tr></thead><tbody>';

     +'<td><button class="btn sm" onclick="editSeg(\''+s.id+'\')">Edit</button> <button class="btn sm danger" onclick="delSeg(\''+s.id+'\')">✕</button></td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function viewMonthly(){
  var M={}, order=[];
  function bucket(key){ if(!M[key]){ M[key]={nights:0,accom:0,live:0,transport:0}; order.push(key); } return M[key]; }
  state.segments.filter(function(s){return s.include!==false;}).forEach(function(s){
    var nn=segNights(s); if(nn<=0) return;
    var k=kb(s.city), tier=(s.tier==null?1:s.tier);
    var chosen=state.stays.filter(function(st){return st.segId===s.id && st.include;});
    var accomTotal = chosen.length ? chosen.reduce(function(a,st){return a+toHUF(st.ppn,st.cur)*(st.nights!=null?st.nights:nn);},0) : (k?usdToHUF(k.accom[tier])*nn:0);
    var accomPN=accomTotal/nn, livePN=k?usdToHUF(k.live[tier]):0;
    var d=new Date(s.arrive+"T00:00:00");
    for(var i=0;i<nn;i++){ var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); var b=bucket(key); b.nights++; b.accom+=accomPN; b.live+=livePN; d.setDate(d.getDate()+1); }
  });
  state.transport.filter(function(t){return t.include && t.date;}).forEach(function(t){ var b=bucket(t.date.slice(0,7)); b.transport+=toHUF(t.price,t.cur); });
  order.sort();
  var extrasTotal=state.extras.filter(function(e){return e.include;}).reduce(function(a,e){return a+toHUF(e.amount,e.cur);},0);
  var totalNights=0,totA=0,totL=0,totT=0;
  order.forEach(function(key){ var b=M[key]; totalNights+=b.nights; totA+=b.accom; totL+=b.live; totT+=b.transport; });
  var recMonthly=(totalNights?(totA+totL)/totalNights:0)*365/12;
  var allInMonthly=(totalNights?(totA+totL+totT)/totalNights:0)*365/12;
  var h='<h2>Monthly spending</h2><p class="sub">How much cash goes out each calendar month, so you can set an earning target while you work on the road. Rent &amp; daily living are spread across the nights of each stay; flights land in the month they happen; one-off costs are listed separately (they are not monthly).</p>';
  h+='<div class="grid cards">';
  h+=stat("Earn target / month", fmtHUF(recMonthly), "~$"+Math.round(recMonthly/state.rates.USD)+" - covers rent + daily living");
  h+=stat("All-in / month", fmtHUF(allInMonthly), "~$"+Math.round(allInMonthly/state.rates.USD)+" - incl. flights, excl. one-offs");
  h+=stat("One-off costs (upfront)", fmtHUF(extrasTotal), "insurance, gear, visas, tickets");
  h+='</div>';
  h+='<div class="tablewrap" style="margin-top:14px"><table><thead><tr><th>Month</th><th>Nights</th><th>Rent</th><th>Daily living</th><th>Flights</th><th>Month total</th></tr></thead><tbody>';
  order.forEach(function(key){ var b=M[key]; var mt=b.accom+b.live+b.transport; var lbl=new Date(key+"-01T00:00:00").toLocaleString("en-US",{month:"long",year:"numeric"});
    h+='<tr><td><b>'+lbl+'</b></td><td>'+b.nights+'</td><td>'+fmtHUF(b.accom)+'</td><td>'+fmtHUF(b.live)+'</td><td>'+(b.transport?fmtHUF(b.transport):"—")+'</td><td><b>'+fmtHUF(mt)+'</b></td></tr>';
  });
  h+='<tr><td><b>Total</b></td><td>'+totalNights+'</td><td>'+fmtHUF(totA)+'</td><td>'+fmtHUF(totL)+'</td><td>'+fmtHUF(totT)+'</td><td><b>'+fmtHUF(totA+totL+totT)+'</b></td></tr>';
  h+='</tbody></table></div>';
  var max=0; order.forEach(function(key){ var b=M[key]; max=Math.max(max,b.accom+b.live+b.transport); });
  h+='<h3>Monthly cash-out</h3><div class="card">';
  order.forEach(function(key){ var b=M[key]; var mt=b.accom+b.live+b.transport; var lbl=new Date(key+"-01T00:00:00").toLocaleString("en-US",{month:"short",year:"2-digit"});
    h+='<div class="row" style="margin:6px 0"><span style="width:62px" class="tag">'+lbl+'</span><div class="bar" style="flex:1"><span style="width:'+(max?mt/max*100:0)+'%"></span></div><span style="width:115px;text-align:right">'+fmtHUF(mt)+'</span></div>';
  });
  h+='</div>';
  h+='<div class="note" style="margin-top:14px"><b>Earning target:</b> to cover day-to-day costs while travelling, aim to earn at least <b>'+fmtHUF(recMonthly)+'/month</b> (~$'+Math.round(recMonthly/state.rates.USD)+') between the two of you. Flights and the '+fmtHUF(extrasTotal)+' of one-off costs sit on top - ideally saved before you go, or spread as ~'+fmtHUF(order.length?extrasTotal/order.length:0)+'/month. Months containing a long-haul flight will spike (see the table).</div>';
  return h;
}

var dataRegion="ALL",dataSearch="",dataSort="city",dataDir=1,dataOpen={};
function setDataR(r){ dataRegion=r; render(); }
function setDataSort(k){ if(dataSort===k) dataDir=-dataDir; else {dataSort=k;dataDir=1;} rerenderData(); }
function toggleDataRow(i){ dataOpen[i]=!dataOpen[i]; rerenderData(); }
function rerenderData(){ var el=document.getElementById("dataList"); if(el) el.innerHTML=dataTableHTML(); }
function viewData(){
  var h='<h2>Data table</h2><p class="sub">All '+CITIES.length+' cities: average costs, food, transport and month-by-month weather. Click a column to sort, a row to expand. Loaded from cities.json (offline: embedded copy).</p>';
  h+='<div class="row noprint" style="margin-bottom:12px">';
  ["ALL","SE","EA","SA"].forEach(function(r){ h+='<button class="btn sm '+(dataRegion===r?"acc":"")+'" onclick="setDataR(\''+r+'\')">'+(r==="ALL"?"All regions":regName(r))+'</button>'; });
  h+='<input style="max-width:220px" placeholder="Search city/country…" value="'+esc(dataSearch)+'" oninput="dataSearch=this.value;rerenderData()"></div>';
  h+='<div id="dataList">'+dataTableHTML()+'</div>';
  h+='<div class="row noprint" style="margin-top:10px"><button class="btn sm" onclick="exportCSV()">⬇ Export table as CSV</button></div>';
  return h;
}
function dataTableHTML(){
  var q=dataSearch.toLowerCase();
  var list=CITIES.filter(function(c){return (dataRegion==="ALL"||c.r===dataRegion) && (!q||(c.city+" "+c.country).toLowerCase().indexOf(q)>=0);});
  var keyf={city:function(c){return c.city;},country:function(c){return c.country;},day:function(c){return (c.allIn[0]+c.allIn[1])/2;},accom:function(c){return c.accom[1];},rent:function(c){return c.rent;},live:function(c){return c.live[1];}};
  var kf=keyf[dataSort]||keyf.city;
  list=list.slice().sort(function(a,b){var x=kf(a),y=kf(b); if(typeof x==="string") return x.localeCompare(y)*dataDir; return (x-y)*dataDir;});
  function th(k,label){ return '<th style="cursor:pointer;white-space:nowrap" onclick="setDataSort(\''+k+'\')">'+label+(dataSort===k?(dataDir>0?" ▲":" ▼"):"")+'</th>'; }
  var h='<div class="tablewrap"><table><thead><tr>'+th("city","City")+th("country","Country")+'<th>Reg</th>'+th("day","All-in $/day")+th("accom","Accom $/night b·m·n")+th("rent","Rent $/mo")+th("live","Living $/day")+'<th>Best / hazard</th></tr></thead><tbody>';
  if(!list.length) h+='<tr><td colspan="8" class="muted">No matches.</td></tr>';
  list.forEach(function(c){ var ci=CITIES.indexOf(c);
    h+='<tr style="cursor:pointer" onclick="toggleDataRow('+ci+')"><td><b>'+esc(c.city)+'</b></td><td>'+esc(c.country)+'</td><td><span class="pill" style="background:'+regColor(c.r)+'"></span>'+esc(c.r)+'</td>'
     +'<td>$'+c.allIn[0]+'-'+c.allIn[1]+'</td><td>'+c.accom[0]+' / '+c.accom[1]+' / '+c.accom[2]+'</td><td>$'+c.rent+'</td><td>$'+c.live[0]+'-'+c.live[2]+'</td><td class="muted" style="max-width:300px">'+esc((c.weather&&c.weather.hazard)||"")+'</td></tr>';
    if(dataOpen[ci]) h+='<tr><td colspan="8" style="background:#141c25">'+dataDetail(c)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
function dataDetail(c){
  var h='<div class="f2"><div><b>Food:</b> <span class="muted">'+esc(c.meals)+'</span><br><b>Transport:</b> <span class="muted">'+esc(c.transit)+'</span><br><b>Internet:</b> <span class="muted">'+esc(c.net)+'</span><br><b>Rent (furnished 1-BR):</b> $'+c.rent+'/mo</div>';
  h+='<div><b>Landmarks:</b><ul style="margin:4px 0 0 16px;padding:0">'+(c.land||[]).map(function(l){return '<li class="muted">'+esc(l.n)+' — '+esc(l.c)+', '+esc(l.d)+'</li>';}).join("")+'</ul></div></div>';
  if(c.weather&&c.weather.months&&c.weather.months.length){
    h+='<div style="margin-top:8px;overflow-x:auto"><b>Monthly weather (avg °C / rain mm):</b><table style="margin-top:4px;font-size:12px"><thead><tr><th></th>'+c.weather.months.map(function(m){return '<th>'+esc(m.m)+'</th>';}).join("")+'</tr></thead><tbody>'
     +'<tr><td class="muted">High °C</td>'+c.weather.months.map(function(m){return '<td>'+m.hi+'</td>';}).join("")+'</tr>'
     +'<tr><td class="muted">Low °C</td>'+c.weather.months.map(function(m){return '<td>'+m.lo+'</td>';}).join("")+'</tr>'
     +'<tr><td class="muted">Rain mm</td>'+c.weather.months.map(function(m){return '<td>'+m.rain+'</td>';}).join("")+'</tr>'
     +'</tbody></table></div>';
  }
  h+='<div class="note" style="margin-top:8px"><b>Season:</b> '+esc((c.weather&&c.weather.hazard)||"")+'</div>';
  return h;
}
function exportCSV(){
  var rows=[["City","Country","Region","AllIn_low","AllIn_high","Accom_budget","Accom_mid","Accom_nice","Rent_mo","Living_low","Living_mid","Living_high","Hazard"]];
  CITIES.forEach(function(c){ rows.push([c.city,c.country,c.r,c.allIn[0],c.allIn[1],c.accom[0],c.accom[1],c.accom[2],c.rent,c.live[0],c.live[1],c.live[2],(c.weather&&c.weather.hazard)||""]); });
  var csv=rows.map(function(r){return r.map(function(x){return '"'+String(x).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="asia-cities-data.csv"; a.click();
}

/* ============================ MAP (3D GLOBE) ============================ */
/* globe.gl is vendored in vendor/ and loaded on demand (only when the Map tab is
   first opened) so it never slows the rest of the app. Works offline. */
var _globeLib=false,_globeLoading=null,_globeInst=null,_globeBound=false;
function loadGlobeLib(){
  if(_globeLib) return Promise.resolve();
  if(_globeLoading) return _globeLoading;
  _globeLoading=new Promise(function(res,rej){
    var s=document.createElement("script"); s.src="vendor/globe.gl.min.js";
    s.onload=function(){ _globeLib=true; res(); };
    s.onerror=function(){ rej(new Error("globe lib failed to load")); };
    document.head.appendChild(s);
  });
  return _globeLoading;
}
function _globeResize(){ var box=document.getElementById("globeBox"); if(box&&_globeInst){ _globeInst.width(box.clientWidth); _globeInst.height(box.clientHeight); } }
function viewMap(){
  var h='<h2>Route map</h2><p class="sub">Your trip across Asia on a 3D globe. <b>Bright markers + glowing arcs</b> are your itinerary in date order; faint dots are the other knowledge-base cities. Drag to spin, scroll to zoom, hover a marker for cost, click it to open the Knowledge Base. Fully offline.</p>';
  h+='<div id="globeWrap" style="height:70vh;min-height:430px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0b0f14;position:relative">';
  h+='<div id="globeBox" style="width:100%;height:100%"></div>';
  h+='<div id="globeMsg" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px;pointer-events:none">Loading the globe…</div>';
  h+='</div>';
  h+='<div class="row" style="margin-top:10px;font-size:12.5px">'
    +'<span><span class="pill" style="background:var(--se)"></span>Southeast Asia</span>'
    +'<span><span class="pill" style="background:#6c8ccf"></span>East Asia</span>'
    +'<span><span class="pill" style="background:#cf8a6c"></span>South Asia</span>'
    +'<span class="muted right">'+CITIES.filter(function(c){return c.lat!=null;}).length+' cities mapped · no API key · no internet needed</span></div>';
  return h;
}
function initGlobe(){
  var box=document.getElementById("globeBox"); if(!box) return;
  loadGlobeLib().then(function(){
    var msg=document.getElementById("globeMsg"); if(msg) msg.style.display="none";
    buildGlobe();
  }).catch(function(){
    var msg=document.getElementById("globeMsg"); if(msg) msg.innerHTML="Couldn't load the 3D globe (<code>vendor/globe.gl.min.js</code> missing). The rest of the app still works.";
  });
}
function buildGlobe(){
  var box=document.getElementById("globeBox"); if(!box||typeof Globe!=="function") return;
  box.innerHTML="";
  var route=state.segments.filter(function(s){return s.include!==false;})
    .map(function(s){ var k=kb(s.city); return (k&&k.lat!=null)?{city:s.city,country:s.country,r:k.r,lat:k.lat,lng:k.lng,arrive:s.arrive||"",live:k.live}:null; })
    .filter(Boolean)
    .sort(function(a,b){ return a.arrive<b.arrive?-1:(a.arrive>b.arrive?1:0); });
  var routeSet={}; route.forEach(function(s){ routeSet[s.city]=true; });
  var points=CITIES.filter(function(c){return c.lat!=null;}).map(function(c){
    var on=routeSet[c.city];
    return {lat:c.lat,lng:c.lng,city:c.city,country:c.country,r:c.r,live:c.live,
      color: on?regColor(c.r):"rgba(143,160,176,0.5)", radius: on?0.55:0.26, alt: on?0.02:0.004};
  });
  var arcs=[];
  for(var i=0;i<route.length-1;i++){ var a=route[i],b=route[i+1];
    if(a.lat===b.lat&&a.lng===b.lng) continue;
    arcs.push({startLat:a.lat,startLng:a.lng,endLat:b.lat,endLng:b.lng,color:[regColor(a.r),regColor(b.r)]});
  }
  var g=Globe()(box)
    .globeImageUrl("vendor/earth-night.jpg")
    .backgroundColor("rgba(0,0,0,0)")
    .showAtmosphere(true).atmosphereColor("#37b3a4").atmosphereAltitude(0.16)
    .pointsData(points).pointLat("lat").pointLng("lng").pointColor("color").pointAltitude("alt").pointRadius("radius")
    .pointLabel(function(d){ return '<div style="background:#171e26;border:1px solid #2a3642;border-radius:8px;padding:6px 9px;color:#e8edf2;font:13px -apple-system,sans-serif"><b>'+esc(d.city)+'</b><br><span style="color:#8fa0b0">'+esc(d.country)+(d.live?" · ~$"+d.live[1]+"/day":"")+'</span></div>'; })
    .onPointClick(function(){ go("kb"); })
    .arcsData(arcs).arcStartLat("startLat").arcStartLng("startLng").arcEndLat("endLat").arcEndLng("endLng")
    .arcColor("color").arcStroke(0.5).arcDashLength(0.4).arcDashGap(0.18).arcDashAnimateTime(2500)
    .labelsData(route).labelLat("lat").labelLng("lng").labelText("city").labelSize(0.85).labelDotRadius(0.32).labelColor(function(){return "#e8edf2";}).labelResolution(2);
  _globeInst=g;
  g.pointOfView({lat:20,lng:108,altitude:2.1},0);
  setTimeout(_globeResize,0);
  if(!_globeBound){ window.addEventListener("resize",_globeResize); _globeBound=true; }
  try{ var ctl=g.controls(); if(ctl){ ctl.autoRotate=true; ctl.autoRotateSpeed=0.55; ctl.enableDamping=true; } }catch(e){}
}

/* ============================ MONEY / INCOME LEDGER ============================ */
/* Stored separately from the trip (its own localStorage key + its own income.json),
   as a flat array of rows shaped to map 1:1 onto a future Supabase `ledger` table:
   { id, date:"YYYY-MM-DD", type:"income"|"expense", category, amount, currency, note } */
var LEDGER_KEY="asiaNomadLedger_v1";
var ledger=[];
function loadLedger(){ try{ var s=localStorage.getItem(LEDGER_KEY); if(s){ var d=JSON.parse(s); return Array.isArray(d)?d:(d.entries||[]); } }catch(e){} return []; }
function saveLedger(){ try{ localStorage.setItem(LEDGER_KEY, JSON.stringify(ledger)); }catch(e){} }
ledger=loadLedger();
function ledgerByMonth(){
  var M={},order=[];
  function b(k){ if(!M[k]){ M[k]={inc:0,exp:0}; order.push(k); } return M[k]; }
  ledger.forEach(function(e){ if(!e.date) return; var huf=toHUF(e.amount,e.currency); if(e.type==="expense") b(e.date.slice(0,7)).exp+=huf; else b(e.date.slice(0,7)).inc+=huf; });
  return {M:M,order:order};
}
function plannedByMonth(){
  var M={};
  function add(k,v){ M[k]=(M[k]||0)+v; }
  state.segments.filter(function(s){return s.include!==false;}).forEach(function(s){
    var nn=segNights(s); if(nn<=0) return;
    var k=kb(s.city),tier=(s.tier==null?1:s.tier);
    var chosen=state.stays.filter(function(st){return st.segId===s.id && st.include;});
    var accomTotal=chosen.length?chosen.reduce(function(a,st){return a+toHUF(st.ppn,st.cur)*(st.nights!=null?st.nights:nn);},0):(k?usdToHUF(k.accom[tier])*nn:0);
    var accomPN=accomTotal/nn, livePN=k?usdToHUF(k.live[tier]):0;
    var d=new Date(s.arrive+"T00:00:00");
    for(var i=0;i<nn;i++){ add(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"), accomPN+livePN); d.setDate(d.getDate()+1); }
  });
  state.transport.filter(function(t){return t.include && t.date;}).forEach(function(t){ add(t.date.slice(0,7), toHUF(t.price,t.cur)); });
  return M;
}
function addLedger(){
  var amt=parseFloat(val("le_amount"));
  if(!isFinite(amt)||amt<=0){ alert("Enter an amount greater than 0."); return; }
  ledger.push({ id:uid("le"), date:val("le_date")||new Date().toISOString().slice(0,10),
    type:(val("le_type")==="expense"?"expense":"income"),
    category:(val("le_cat")||"").trim()||"(uncategorised)",
    amount:amt, currency:val("le_cur")||state.meta.baseCurrency||"HUF", note:(val("le_note")||"").trim() });
  saveLedger(); render();
}
function delLedger(id){ if(!confirm("Delete this entry?")) return; ledger=ledger.filter(function(x){return x.id!==id;}); saveLedger(); render(); }
function exportLedger(){
  var blob=new Blob([JSON.stringify({type:"anp-ledger",version:1,exported:new Date().toISOString().slice(0,10),entries:ledger},null,2)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="income.json"; a.click();
}
function importLedger(ev){
  var f=ev.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){ try{
    var d=JSON.parse(r.result); var rows=Array.isArray(d)?d:(d.entries||null); if(!rows) throw 0;
    ledger=rows.map(function(x){ return {id:x.id||uid("le"), date:x.date||"", type:(x.type==="expense"?"expense":"income"), category:x.category||"(uncategorised)", amount:Number(x.amount)||0, currency:x.currency||"HUF", note:x.note||""}; });
    saveLedger(); render(); alert("Loaded "+ledger.length+" ledger entr"+(ledger.length===1?"y":"ies")+".");
  }catch(e){ alert("That file is not a valid income.json ledger."); } };
  r.readAsText(f); ev.target.value="";
}
function exportLedgerCSV(){
  var head=["date","type","category","amount","currency","amount_huf","note"];
  var rows=ledger.slice().sort(function(a,b){return a.date<b.date?-1:1;}).map(function(e){
    return [e.date,e.type,e.category,e.amount,e.currency,Math.round(toHUF(e.amount,e.currency)),e.note||""];
  });
  function cell(c){ c=String(c==null?"":c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }
  var csv=[head.join(",")].concat(rows.map(function(r){return r.map(cell).join(",");})).join("\n");
  var blob=new Blob([csv],{type:"text/csv"}); var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="income.csv"; a.click();
}

    };
    Object.keys(wx).forEach(function(id){ var s=state.segments.find(function(x){return x.id===id;}); if(s) s.weather=wx[id]; });

  }
  // found Shanghai hotel (added as the Shanghai stay)
  if(state.meta && !state.meta._sh_hotel){
    if(!state.stays.some(function(s){return s.id==="st_sh1";})){
      state.stays.push({id:"st_sh1",segId:"sg_sh",name:"Shanghai city-centre hotel (found)",platform:"",url:"",cur:"HUF",ppn:14286,nights:7,rating:0,status:"shortlist",include:true,notes:"FOUND: ~100,000 Ft total for 7 nights (Sep 3-10). Free cancellation until Sep 1. Central + work desk. Breakfast +30,000 Ft/stay (toggle in Budget extras); lunch ~2,600 Ft on site. NOTE: hotel runs Sep 3-10 but your flight lands Sep 4 (Sep 3 night = guaranteed early check-in) and your Osaka flight is Sep 11 - one night (Sep 10) to reconcile."});
    }
    if(!state.extras.some(function(e){return e.id==="ex_sh_bfast";})){
      state.extras.push({id:"ex_sh_bfast",label:"Shanghai hotel breakfast (7n)",cur:"HUF",amount:30000,category:"Other",include:false});
    }
    state.meta._sh_hotel=true; save();
  }
  render();
})();
